services:
  # ── App (Blue/Green) ─────────────────────────────────────────
  # Two identical app services gated by Docker Compose profiles.
  # Only one runs at a time; deploy.sh orchestrates the swap.
  app-blue:
    image: tribes-app:blue
    container_name: tribes-app-blue
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    networks: [tribes]
    volumes:
      - ./keys:/app/keys:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9002/api/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    profiles: ["blue"]

  app-green:
    image: tribes-app:green
    container_name: tribes-app-green
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    networks: [tribes]
    volumes:
      - ./keys:/app/keys:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9002/api/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    profiles: ["green"]

  # ── WebSocket Relay ───────────────────────────────────────────
  ws-relay:
    build:
      context: ./ws-relay
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    networks: [tribes]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Database (PostgreSQL) ──────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tribes
      POSTGRES_USER: tribes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [tribes]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tribes"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Connection Pooling (PgBouncer) ─────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DATABASE_URLS: "postgres://tribes:${POSTGRES_PASSWORD}@postgres:5432/tribes,postgres://tribes_app:${TRIBES_APP_PASSWORD}@postgres:5432/tribes"
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    depends_on:
      postgres:
        condition: service_healthy
    networks: [tribes]

  # ── Rate Limiting (Valkey — Redis-compatible, BSD licensed) ───
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    command:
      - valkey-server
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "900 1"                     # Persist to disk every 15min if ≥1 change
    networks: [tribes]

  # ── Object Storage (SeaweedFS) ────────────────────────────────
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: "master -ip=seaweedfs-master -defaultReplication=000 -mdir=/data"
    volumes:
      - seaweed-master:/data
    networks: [tribes]

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: "volume -mserver=seaweedfs-master:9333 -port=8080 -dir=/data -max=100"
    volumes:
      - seaweed-volume:/data
    depends_on: [seaweedfs-master]
    networks: [tribes]

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: "filer -master=seaweedfs-master:9333 -s3 -s3.port=8333 -dataCenter=defaultDataCenter"
    volumes:
      - seaweed-filer:/data
    depends_on: [seaweedfs-master, seaweedfs-volume]
    networks: [tribes]

  # ── Reverse Proxy + Auto TLS (Caddy) ─────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"               # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data            # TLS certs (persisted across restarts)
      - caddy-config:/config
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-tribes.app}
      - WS_DOMAIN=${WS_DOMAIN:-ws.tribes.app}
      - MEDIA_DOMAIN=${MEDIA_DOMAIN:-media.tribes.app}
    depends_on:
      ws-relay:
        condition: service_started
      seaweedfs-filer:
        condition: service_started
    networks: [tribes]

# ── Volumes ───────────────────────────────────────────────────
volumes:
  pg-data:
  # Preserve sqld-data temporarily for backup
  sqld-data:
  valkey-data:
  seaweed-master:
  seaweed-volume:
  seaweed-filer:
  caddy-data:
  caddy-config:

# ── Networks ──────────────────────────────────────────────────
networks:
  tribes:
    driver: bridge
    # Internal-only network — only Caddy exposes ports to the host
