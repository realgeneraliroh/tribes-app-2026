name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # Run the supply chain audit on a daily schedule even without code changes
  # so newly disclosed CVEs are caught quickly.
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC every day

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Supply Chain Security Audit
  #    Fails the build on HIGH or CRITICAL severity vulnerabilities.
  #    Moderate issues are reported but do not block (many are in
  #    dev-only tooling that never ships to production).
  # ──────────────────────────────────────────────────────────────
  audit:
    name: Supply Chain Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run security audit (high + critical only)
        # Exit code 1 = vulnerabilities at or above --audit-level found.
        # We gate on HIGH so moderate findings (mostly dev tooling) don't
        # block shipping while still catching exploitable production CVEs.
        run: npm audit --audit-level=high

      - name: Run full audit report (informational)
        # Always run the full report so moderates are visible in the log,
        # even when the build is green.
        if: always()
        run: npm audit --json | npx --yes better-npm-audit --audit-level=moderate || true

  # ──────────────────────────────────────────────────────────────
  # 2. Type Checking
  #    Catches TypeScript errors that could mask security issues
  #    (e.g., `any` types slipping back into auth surfaces).
  # ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript compiler
        run: npm run typecheck

  # ──────────────────────────────────────────────────────────────
  # 2b. Migration Drift Check
  #     Ensures every schema.ts change has a corresponding
  #     drizzle migration SQL file committed. Runs `drizzle-kit
  #     generate` and fails if it produces new SQL — meaning the
  #     developer forgot to generate + commit the migration.
  # ──────────────────────────────────────────────────────────────
  migration-drift:
    name: Migration Drift Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for uncommitted migrations
        run: |
          npx drizzle-kit generate 2>&1
          # If drizzle-kit generated new SQL files, they'll appear as untracked
          NEW_FILES=$(git ls-files --others --exclude-standard 'drizzle/*.sql')
          CHANGED_FILES=$(git diff --name-only 'drizzle/')
          if [ -n "$NEW_FILES" ] || [ -n "$CHANGED_FILES" ]; then
            echo "::error::Migration drift detected! Schema changes exist without a committed migration."
            echo ""
            echo "New migration files that should have been committed:"
            echo "$NEW_FILES"
            echo "$CHANGED_FILES"
            echo ""
            echo "Fix: run 'npx drizzle-kit generate' locally and commit the resulting SQL file."
            exit 1
          fi
          echo "✅ No migration drift — schema.ts and drizzle/ are in sync."

  # ──────────────────────────────────────────────────────────────
  # 3. Build Verification
  #    Ensures a production Next.js build succeeds before any
  #    changes reach the server. Next.js 16 runs ESLint internally
  #    during `next build` (if configured), so a separate lint job
  #    is redundant without a standalone ESLint setup.
  # ──────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [audit, typecheck, migration-drift]
    env:
      # ── Stub env vars for CI build ──────────────────────────────────────────
      # Next.js collects static page data at build time, which imports modules
      # that call requireEnv() at module-load time. These stubs prevent those
      # throws without exposing real secrets. API routes are all dynamic (ƒ) so
      # none of these values are actually used at runtime during the build.
      TURSO_DATABASE_URL: ''
      SESSION_SECRET: 'ci-only-not-a-real-secret-32ch!!'
      NEXT_PUBLIC_APP_URL: 'https://tribes.app'
      NEXT_PUBLIC_INVITE_ONLY: 'false'
      # S3 / SeaweedFS — required by s3-service.ts at module load time
      S3_ENDPOINT: 'http://ci-stub:9333'
      S3_PUBLIC_ENDPOINT: 'https://ci-stub.example.com'
      S3_ACCESS_KEY_ID: 'ci-stub-key'
      S3_SECRET_ACCESS_KEY: 'ci-stub-secret'
      S3_BUCKET_NAME: 'tribes'
      S3_PRIVATE_BUCKET_NAME: 'tribes-private'
      S3_REGION: 'us-east-1'
      # WebAuthn — stubs to prevent passkey init errors
      WEBAUTHN_RP_ID: 'localhost'
      WEBAUTHN_RP_NAME: 'Tribes CI'
      WEBAUTHN_ORIGIN: 'http://localhost:9002'
      # Stripe — stubs (webhooks are dynamic, never called at build time)
      STRIPE_SECRET_KEY: 'sk_test_ci_stub'
      STRIPE_WEBHOOK_SECRET: 'whsec_ci_stub'
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: 'pk_test_ci_stub'
      # Email — stubs
      SMTP_HOST: 'localhost'
      SMTP_PORT: '1025'
      SMTP_USER: 'ci@example.com'
      SMTP_PASS: 'ci-stub'
      # Cron — stubs
      CRON_SECRET: 'ci-stub-cron-secret'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────────
  # 5. Scheduled Audit Notification
  #    On the daily schedule run, if the audit fails (new CVE),
  #    GitHub will email the repo owner automatically via the
  #    failed workflow notification. No extra setup needed.
  # ──────────────────────────────────────────────────────────────
